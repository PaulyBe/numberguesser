<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Number Guessing Game</title>
</head>

<body>
    <div id="container">
        <h1>Number Guessing Game</h1><br>
        <h2>Guess a number between 1 and 100!</h2><br>
        <p id="output"><b>Enter a number below</b></p><br>
        <input type="text" id="userInput" placeholder="Enter your guess here">
        <button id="btn" class="btn">Submit</button>
    </div>
    <br>
    <div>
        <button id="resetbtn">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
